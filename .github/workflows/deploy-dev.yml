name: Deploy dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Tailscale MacBook
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - ai-health
    timeout-minutes: 15

    steps:
      - name: Update application
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR="$HOME/workbench/AH_web_development_assignment"
          cd "$DEPLOY_DIR"

          test -z "$(git status --porcelain)" || {
            echo "Deployment directory has uncommitted changes."
            git status --short
            exit 1
          }

          git switch dev
          git fetch origin dev
          git merge --ff-only origin/dev
          /opt/homebrew/bin/uv sync --locked
          /opt/homebrew/bin/uv run alembic upgrade head

      - name: Restart FastAPI service
        shell: bash
        run: |
          set -euo pipefail
          launchctl kickstart -k \
            "gui/$(id -u)/com.ozcoding.ai-health-web"

      - name: Install and restart prediction runtime
        shell: bash
        run: |
          set -euo pipefail
          bash "$HOME/workbench/AH_web_development_assignment/scripts/install_prediction_runtime.sh"

      - name: Verify deployment
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              --max-time 3 \
              http://100.105.8.109:8000/healthcheck; then
              echo
              echo "Deployment health check passed."
              exit 0
            fi

            echo "Waiting for FastAPI (${attempt}/20)..."
            sleep 2
          done

          echo "Deployment health check failed."
          tail -n 100 "$HOME/Library/Logs/ai-health-web.err.log" || true
          exit 1

      - name: Verify prediction runtime
        shell: bash
        run: |
          set -euo pipefail

          redis-cli ping | grep -q PONG

          for attempt in {1..90}; do
            if grep -q "큐 대기 시작" \
              "$HOME/Library/Logs/ai-health-worker.log" 2>/dev/null; then
              echo "Prediction worker is ready."
              exit 0
            fi

            if ! launchctl print \
              "gui/$(id -u)/com.ozcoding.ai-health-worker" >/dev/null 2>&1; then
              echo "Prediction worker service is not loaded."
              break
            fi

            echo "Waiting for prediction model (${attempt}/90)..."
            sleep 2
          done

          echo "Prediction worker did not become ready."
          tail -n 100 "$HOME/Library/Logs/ai-health-worker.log" || true
          tail -n 100 "$HOME/Library/Logs/ai-health-worker.err.log" || true
          exit 1
